# ============================================
# TERMINAL SETTINGS
# ============================================

# Use tmux-256color for richer terminal capabilities (italics, true color)
# than the older screen-256color fallback
set -g default-terminal "tmux-256color"

# Enable 24-bit true color (RGB) passthrough for any 256-color terminal.
# -ga appends rather than replaces so future overrides can stack
set -ga terminal-overrides ",*256col*:RGB"

# ============================================
# GENERAL BEHAVIOR
# ============================================

# Reduce ESC delay so vim/nvim feels responsive (default ~500ms is laggy)
set -sg escape-time 10

# Bump scrollback from default 2000 to 50000 lines per pane
set -g history-limit 50000

# Forward terminal focus events to inner apps (enables vim :autoread,
# FocusGained/FocusLost autocmds, etc.). Requires terminal support —
# iTerm2/Ghostty/WezTerm/Kitty yes, Terminal.app no
set -g focus-events on

# Start window/pane numbering at 1 — easier to reach than 0 on the keyboard
set -g base-index 1
setw -g pane-base-index 1

# Auto-close gaps in window numbering when a window is closed
set -g renumber-windows on

# Keep window titles stable — don't let tmux auto-rename based on the
# running command, and don't let programs rename via escape sequences.
# Set window titles manually with `prefix + ,`
set -g automatic-rename off
set -g allow-rename off

# ============================================
# STATUS BAR
# ============================================

# Enable the status bar at the bottom of the screen
set -g status on

# Status bar colors: dark gray background (#303030), light gray text
set -g status-style bg=colour236,fg=colour250

# Active/current window tab: bright blue background, white bold text
setw -g window-status-current-style bg=colour39,fg=colour231
setw -g window-status-current-format " #[bold]#I:#W "

# Inactive window tabs: default background, medium gray text
setw -g window-status-style bg=default,fg=colour244
setw -g window-status-format " #I:#W "

# Left-align the window list (default centers it)
set -g status-justify left

# Left side: session name (truncated to 10 chars) in bold green.
# Use long-form variable #{=10:session_name} rather than #{=10:#S} —
# the #S shortcut doesn't compose cleanly with the truncation prefix.
# colour46 = pure green from the 256-color cube (#00ff00), stable across
# terminals/themes — colour10 is the ANSI "bright green" slot, which themes
# remap (e.g. Solarized makes it gray)
set -g status-left "#[fg=colour46,bold]#{=10:session_name} "
set -g status-left-length 20

# Right side: date in light gray, time in darker gray
set -g status-right "#[fg=colour250]%Y-%m-%d #[fg=colour244]%H:%M"

# ============================================
# PANES
# ============================================

# Pane backgrounds: only visible in margins/empty space because most programs
# (bash, vim, etc.) paint their own background. So this is a secondary cue —
# the pane border (below) is the primary "which pane is active" signal.
# Both colors set explicitly (rather than active=default) so the contrast
# doesn't depend on the iTerm2 profile bg. colour234 = near-black (active),
# colour238 = clearly visible mid-gray (inactive)
set -g window-active-style 'bg=colour234'
set -g window-style 'bg=colour236'

# Pane borders: dim gray by default, bright blue when active (matches the
# active window tab color in the status bar). This is the main active-pane
# indicator since border is always visible regardless of inner program
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour39

# ============================================
# MOUSE & INPUT
# ============================================

# Enable mouse support for scrolling, pane selection, and resizing
set -g mouse on

# ============================================
# KEY BINDINGS
# ============================================

# Primary prefix: Ctrl+Space (Ctrl+B clashes with readline's "back one
# character" in the shell). Ctrl+B kept as a secondary prefix during
# the transition — both work, remove prefix2 once C-Space is muscle memory.
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Reload this config file with prefix + r and show confirmation
bind r source-file ~/.tmux.conf \; display-message "✅ Reloaded"

# Disabled alternative: send the kitty keyboard protocol (CSI-u) encoding
# of Shift+Enter. ESC[13;2u means "key 13 (Enter) + modifier 2 (Shift)".
# Disabled because it only works if the inner app opts into kitty protocol;
# otherwise the bytes get typed in as literal characters.
##bind -n S-Enter send-keys Escape "[13;2u"

# Send Shift+Enter as Ctrl+J (newline) for Claude Code compatibility.
# Default terminals can't distinguish Enter from Shift+Enter (both send \r);
# C-j sends \n instead, which Claude Code treats as a literal newline.
bind -n S-Enter send-keys C-j

# Alt+Arrow navigation without prefix key:
# Alt+Left/Right: cycle through panes in current window
bind -n M-Left select-pane -t :.-
bind -n M-Right select-pane -t :.+

# Alt+Up/Down: switch between tmux sessions
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# ============================================
# WINDOW/PANE CREATION
# ============================================

# Split panes and new windows inherit the current working directory
# Vertical split (top/bottom)
bind '"' split-window -v -c "#{pane_current_path}"

# Horizontal split (left/right)
bind %  split-window -h -c "#{pane_current_path}"

# New window
bind c  new-window -c "#{pane_current_path}"

# ============================================
# SHELL SETTINGS
# ============================================

# Use Homebrew's bash (5.x) instead of macOS's system /bin/bash (3.2)
set-option -g default-shell /opt/homebrew/bin/bash
