# ============================================
# TERMINAL SETTINGS
# ============================================

# Enable 256-color support for proper color rendering in terminal apps
set -g default-terminal "screen-256color"

# ============================================
# STATUS BAR
# ============================================

# Enable the status bar at the bottom of the screen
set -g status on

# Status bar colors: dark gray background (#303030), light gray text
set -g status-style bg=colour236,fg=colour250

# Active/current window tab: bright blue background, white bold text
setw -g window-status-current-style bg=colour39,fg=colour231
setw -g window-status-current-format " #[bold]#I:#W "

# Inactive window tabs: default background, medium gray text
setw -g window-status-style bg=default,fg=colour244
setw -g window-status-format " #I:#W "

# Left side: session name in bold green
set -g status-left "#[fg=colour10,bold]#S "

# Right side: date in light gray, time in darker gray
set -g status-right "#[fg=colour250]%Y-%m-%d #[fg=colour244]%H:%M"

# ============================================
# MOUSE & INPUT
# ============================================

# Enable mouse support for scrolling, pane selection, and resizing
set -g mouse on

# ============================================
# KEY BINDINGS
# ============================================

# Reload this config file with prefix + r and show confirmation
bind r source-file ~/.tmux.conf \; display-message "✅ Reloaded"

# Send Shift+Enter as Ctrl+J (newline) for Claude Code compatibility
# (Alternative commented out: send raw escape sequence for Shift+Enter)
##bind -n S-Enter send-keys Escape "[13;2u"
bind -n S-Enter send-keys C-j

# Alt+Arrow navigation without prefix key:
# Alt+Left/Right: cycle through panes in current window
bind -n M-Left select-pane -t :.-
bind -n M-Right select-pane -t :.+

# Alt+Up/Down: switch between tmux sessions
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# ============================================
# WINDOW/PANE CREATION
# ============================================

# Split panes and new windows inherit the current working directory
# Vertical split (top/bottom)
bind '"' split-window -v -c "#{pane_current_path}"

# Horizontal split (left/right)
bind %  split-window -h -c "#{pane_current_path}"

# New window
bind c  new-window -c "#{pane_current_path}"

# ============================================
# SHELL SETTINGS
# ============================================

# Use Homebrew's bash directly (not as login shell to avoid .bash_profile overhead)
set-option -g default-shell /opt/homebrew/bin/bash
